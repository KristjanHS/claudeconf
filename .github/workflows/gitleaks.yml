name: gitleaks

# Server-side secret-scan backstop. Runs on every push and PR so a local
# `--no-verify` (which skips the git hooks in hooks/) cannot land a secret on
# the public repo. This is the un-bypassable layer.
on:
  push:
  pull_request:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so gitleaks scans every commit
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
